<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAEM BAKERY & PASTRY</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* 1. BRAND COLORS - CHANGE HERE */
        :root { 
            --p-color: #FFEF00;   /* Primary (Yellow) */
            --s-color: #3B270C;   /* Secondary (Mocha) */
            --bg: #ffffff; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #333; font-family: 'Poppins', 'Noto Sans Ethiopic', sans-serif; padding-bottom: 100px; }
        
        /* HEADER - STATIC (NO FLASHING) */
        .header { background: var(--s-color); color: var(--p-color); padding: 10px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; height: 130px; }
        .header h1 { font-family: 'Playfair Display'; font-size: 26px; font-weight: 800; text-align: center; flex-grow: 1; }
        
        /* LOADERS */
        #loader { text-align: center; padding: 50px; font-weight: bold; color: var(--s-color); }

        /* NAVIGATION */
        .nav-bar { display: flex; overflow-x: auto; padding: 15px 10px; background: #fff; position: sticky; top: 130px; z-index: 900; border-bottom: 1px solid #eee; min-height: 195px; scrollbar-width: none; }
        .nav-item { text-align: center; min-width: 150px; opacity: 0.5; cursor: pointer; flex-shrink: 0; border-bottom: 4px solid transparent; transition: 0.3s; }
        .nav-item.active { opacity: 1; font-weight: bold; color: var(--s-color); border-bottom-color: var(--p-color); }
        .nav-item img { width: 125px; height: 125px; border-radius: 50%; object-fit: cover; border: 3px solid #eee; margin-bottom: 8px; }

        /* CARDS */
        .container { padding: 15px; }
        .card { display: flex; align-items: center; background: white; border-radius: 12px; margin-bottom: 15px; padding: 12px; border: 1px solid #f0f0f0; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .food-img { width: 125px; height: 125px; border-radius: 10px; object-fit: cover; margin-right: 15px; }
        .food-title { color: var(--s-color); font-size: 20px; font-weight: 600; }
        .price-tag { font-weight: bold; color: #333; margin-top: 5px; font-size: 18px; background: var(--p-color); padding: 2px 8px; border-radius: 4px; display: inline-block; }

        /* ADMIN */
        #adminDashboard { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#fff; z-index:3000; padding:15px; overflow-y: auto; }
        .admin-section { border: 1px solid #ddd; padding: 15px; border-radius: 10px; margin-bottom: 25px; background: #fafafa; }
        .btn { padding: 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; text-align: center; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 10px 5px; border-bottom: 1px solid #eee; }
        input, select { width: 100%; padding: 12px; margin: 4px 0; border: 1px solid #ccc; border-radius: 8px; }
        
        .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.92); z-index:4000; align-items:center; justify-content:center; }
        .modal { background:white; padding:25px; border-radius:15px; width:92%; max-width:400px; }
        .call-order-btn { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); background: var(--s-color); color: var(--p-color); padding: 16px 35px; border-radius: 50px; text-decoration: none; z-index: 2000; font-weight: bold; }
    </style>
</head>
<body onclick="APP.closeOnOutside(event)">

<header class="header">
    <div onclick="APP.showLogin(event)" style="cursor:pointer; font-size:28px; padding:10px;">☰</div>
    <div style="text-align:center;">
        <h1 id="mainTitle">TAEM BAKERY</h1>
        <div id="subTitle" style="font-size:12px; font-weight:bold; letter-spacing:3px;">MENU</div>
    </div>
    <button onclick="APP.toggleLang()" style="background:var(--p-color); color:var(--s-color); border:none; padding:10px 15px; border-radius:20px; font-weight:bold;">EN/አማ</button>
</header>

<div id="loader">🔄 Loading Menu...</div>

<nav class="nav-bar" id="categoryNav" style="display:none;"></nav>
<div class="container" id="menuListing"></div>

<a href="tel:+251954954591" class="call-order-btn">📞 <span id="callBtnText">Call To Order</span></a>

<div id="adminDashboard">
    <div style="display:flex; justify-content:space-between; align-items:center; background:var(--s-color); padding:20px; color:var(--p-color); border-radius:12px; margin-bottom: 20px;">
        <h3>MANAGEMENT</h3>
        <button onclick="APP.closeAdmin()" style="color:var(--p-color); border:none; background:none; font-size:40px;">&times;</button>
    </div>
    
    <div class="admin-section">
        <h4>1. Category Management</h4>
        <div id="adminCatList"></div>
        <button class="btn" style="background:#8e44ad; width:100%; margin-top:15px;" onclick="APP.openModal('catModal')">+ NEW CATEGORY</button>
    </div>

    <div class="admin-section">
        <h4>2. Food Items Management</h4>
        <button class="btn" style="background:#27ae60; width:100%; margin-bottom:15px;" onclick="APP.openModal('itemModal')">+ NEW FOOD ITEM</button>
        <div style="overflow-x:auto;">
            <table><tbody id="adminItemBody"></tbody></table>
        </div>
    </div>
    <button id="cloudBtn" onclick="APP.saveToCloud()" style="width:100%; padding:22px; background:#27ae60; color:white; border:none; border-radius:12px; font-weight:bold;">💾 SYNC TO CLOUD</button>
</div>

<div id="catModal" class="overlay"><div class="modal" onclick="event.stopPropagation()">
    <h3>Add Category</h3>
    <input type="text" id="nCatId" placeholder="Unique ID (e.g. bread)">
    <input type="text" id="nCatEn" placeholder="English Name">
    <input type="text" id="nCatAm" placeholder="Amharic Name">
    <input type="file" onchange="APP.handleImg(this)">
    <button onclick="APP.createNewCat()" class="btn" style="background:#8e44ad; width:100%; margin-top:15px;">SAVE</button>
</div></div>

<div id="itemModal" class="overlay"><div class="modal" onclick="event.stopPropagation()">
    <h3>Add Food</h3>
    <select id="nItemCat"></select>
    <input type="text" id="nItemEn" placeholder="English Name">
    <input type="text" id="nItemAm" placeholder="Amharic Name">
    <input type="number" id="nItemPrice" placeholder="Price">
    <input type="file" onchange="APP.handleImg(this)">
    <button onclick="APP.createNewItem()" class="btn" style="background:#27ae60; width:100%; margin-top:15px;">ADD</button>
</div></div>

<div id="loginOverlay" class="overlay"><div class="modal" onclick="event.stopPropagation()" style="text-align:center;">
    <h2>Admin Login</h2>
    <input type="text" id="uIn" placeholder="Username">
    <input type="password" id="pIn" placeholder="Password">
    <button onclick="APP.verifyLogin()" class="btn" style="background:var(--s-color); color:var(--p-color); width:100%; margin-top:15px;">LOGIN</button>
</div></div>

<script>
    const CONFIG = {
        // 3. GOOGLE SHEET URL - CHANGE HERE
        URL: "https://script.google.com/macros/s/AKfycbxOhoU_NNDJ5DfaWavYYsYRuh8gpph0jOUTzj0yIxRVN4wlfe8MSwwUX0PTuDeoNScA/exec",
        HOTEL_EN: "TAEM BAKERY",
        HOTEL_AM: "ጣዕም ዳቦና ኬክ"
    };

    const APP = {
        data: [], cats: [], lang: 'en', activeCat: '', imgTmp: '',

        init: async function() {
            try {
                const r = await fetch(`${CONFIG.URL}?t=${Date.now()}`);
                const j = await r.json();
                this.data = j.items || [];
                this.cats = j.cats || [];
                
                document.getElementById('loader').style.display = 'none';
                document.getElementById('categoryNav').style.display = 'flex';
                
                if(this.cats.length > 0 && !this.activeCat) this.activeCat = this.cats[0].id;
                this.render();
            } catch(e) { 
                document.getElementById('loader').innerText = "Connection Error. Please Refresh."; 
            }
        },

        render: function() {
            const isEn = this.lang === 'en';
            document.getElementById('mainTitle').innerText = isEn ? CONFIG.HOTEL_EN : CONFIG.HOTEL_AM;

            // Categories
            document.getElementById('categoryNav').innerHTML = this.cats.map(c => `
                <div class="nav-item ${this.activeCat == c.id ? 'active' : ''}" onclick="APP.setCat('${c.id}')">
                    <img src="${c.img || ''}" onerror="this.src='https://via.placeholder.com/150'">
                    <p>${isEn ? c.en : c.am}</p>
                </div>`).join('');

            // Items
            const filtered = this.data.filter(i => String(i.cat) === String(this.activeCat) && !i.hidden);
            document.getElementById('menuListing').innerHTML = filtered.map(i => `
                <div class="card">
                    <img src="${i.img || ''}" class="food-img" onerror="this.src='https://via.placeholder.com/150'">
                    <div>
                        <div class="food-title">${isEn ? i.en : i.am}</div>
                        <div class="price-tag">${i.price} ETB</div>
                    </div>
                </div>`).join('');
            this.renderAdmin();
        },

        renderAdmin: function() {
            document.getElementById('adminCatList').innerHTML = this.cats.map((c, idx) => `
                <div class="admin-section" style="padding:10px; margin-bottom:5px;">
                    <b>${c.en}</b>
                    <button onclick="APP.deleteCat('${c.id}')" style="float:right; color:red; border:none; background:none;">Del</button>
                </div>`).join('');

            document.getElementById('adminItemBody').innerHTML = this.data.map((i, idx) => `
                <tr>
                    <td><input value="${i.en}" onchange="APP.data[${idx}].en=this.value"></td>
                    <td><input type="number" style="width:80px" value="${i.price}" onchange="APP.data[${idx}].price=this.value"></td>
                    <td><button onclick="APP.deleteItem(${idx})" style="color:red; border:none; background:none;">Del</button></td>
                </tr>`).join('');
            document.getElementById('nItemCat').innerHTML = this.cats.map(c => `<option value="${c.id}">${c.en}</option>`).join('');
        },

        setCat: function(id) { this.activeCat = id; this.render(); },
        toggleLang: function() { this.lang = (this.lang === 'en' ? 'am' : 'en'); this.render(); },
        showLogin: function(e) { e.stopPropagation(); document.getElementById('loginOverlay').style.display='flex'; },
        verifyLogin: function() { 
            if(document.getElementById('uIn').value==='admin' && document.getElementById('pIn').value==='sgs'){ 
                document.getElementById('adminDashboard').style.display='block'; 
                this.closeModals(); 
            } else { alert("Login Failed"); }
            document.getElementById('uIn').value=''; document.getElementById('pIn').value='';
        },
        closeAdmin: function() { document.getElementById('adminDashboard').style.display='none'; },
        closeModals: function() { document.querySelectorAll('.overlay').forEach(o => o.style.display='none'); },
        closeOnOutside: function(e) { if(e.target.className==='overlay') this.closeModals(); },
        openModal: function(id) { document.getElementById(id).style.display='flex'; },
        handleImg: function(input) { const r = new FileReader(); r.onload = (e) => this.imgTmp = e.target.result; r.readAsDataURL(input.files[0]); },
        
        createNewCat: function() {
            const id = document.getElementById('nCatId').value.trim().toLowerCase();
            if(id){ this.cats.push({id, en:document.getElementById('nCatEn').value, am:document.getElementById('nCatAm').value, img:this.imgTmp}); this.closeModals(); this.render(); }
        },
        createNewItem: function() {
            this.data.push({ cat: document.getElementById('nItemCat').value, en: document.getElementById('nItemEn').value, am: document.getElementById('nItemAm').value, price: document.getElementById('nItemPrice').value, img: this.imgTmp, hidden: false });
            this.closeModals(); this.render();
        },
        deleteCat: function(id) { if(confirm("Del?")) { this.cats = this.cats.filter(c => c.id != id); this.render(); } },
        deleteItem: function(idx) { if(confirm("Del?")) { this.data.splice(idx, 1); this.render(); } },

        saveToCloud: async function() {
            const b = document.getElementById('cloudBtn'); b.innerText = "SAVING..."; b.disabled = true;
            try {
                await fetch(CONFIG.URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ items: this.data, cats: this.cats }) });
                alert("Cloud Updated!"); this.init();
            } catch(e) { alert("Sync Failed"); }
            finally { b.innerText = "💾 SYNC TO CLOUD"; b.disabled = false; }
        }
    };
    window.onload = () => APP.init();
</script>
</body>
</html>
