<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAEM BAKERY - MASTER PROFESSIONAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p-green: #FFEF00; --dark-green: #3B270C; --bg: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #333; font-family: 'Poppins', 'Noto Sans Ethiopic', sans-serif; padding-bottom: 100px; }
        .header { background: var(--dark-green); color: var(--p-green); padding: 10px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; height: 130px; }
        .header h1 { font-family: 'Playfair Display'; font-size: 32px; font-weight: 800; text-align: center; flex-grow: 1; }
        .nav-bar { display: flex; overflow-x: auto; padding: 15px 10px; background: #fff; position: sticky; top: 130px; z-index: 900; border-bottom: 1px solid #eee; min-height: 195px; scrollbar-width: none; }
        .nav-item { text-align: center; min-width: 150px; opacity: 0.5; cursor: pointer; flex-shrink: 0; border-bottom: 4px solid transparent; }
        .nav-item.active { opacity: 1; font-weight: bold; color: var(--dark-green); border-bottom-color: var(--p-green); }
        .nav-item img { width: 125px; height: 125px; border-radius: 50%; object-fit: cover; border: 3px solid #eee; margin-bottom: 8px; }
        .nav-item p { font-size: 16px; font-weight: 600; }
        .container { padding: 15px; }
        .card { display: flex; align-items: center; background: white; border-radius: 12px; margin-bottom: 15px; padding: 12px; border: 1px solid #f0f0f0; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .food-img { width: 125px; height: 125px; border-radius: 10px; object-fit: cover; margin-right: 15px; }
        .food-title { color: var(--dark-green); font-size: 20px; font-weight: 600; }
        .price-tag { font-weight: bold; color: #333; margin-top: 5px; font-size: 18px; background: var(--p-green); display: inline-block; padding: 2px 8px; border-radius: 4px; }
        .call-order-btn { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); background: var(--dark-green); color: var(--p-green); padding: 16px 35px; border-radius: 50px; text-decoration: none; z-index: 2000; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        #adminDashboard { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#fff; z-index:3000; padding:15px; overflow-y: auto; }
        .admin-section { border: 1px solid #ddd; padding: 15px; border-radius: 10px; margin-bottom: 25px; background: #fafafa; }
        .btn { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; text-align: center; }
        input, select { width: 100%; padding: 12px; margin: 4px 0; border: 1px solid #ccc; border-radius: 8px; }
        .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.92); z-index:4000; align-items:center; justify-content:center; }
        .modal { background:white; padding:25px; border-radius:15px; width:92%; max-width:400px; }
    </style>
</head>
<body onclick="APP.closeOnOutside(event)">

<header class="header">
    <div onclick="APP.showLogin(event)" style="cursor:pointer; font-size:28px; padding:10px;">☰</div>
    <div style="text-align:center;">
        <h1 id="mainTitle">TAEM BAKERY</h1>
        <div id="subTitle" style="font-size:12px; font-weight:bold; letter-spacing:3px;">PASTRY MENU</div>
    </div>
    <button onclick="APP.toggleLang()" style="background:var(--p-green); color:var(--dark-green); border:none; padding:10px 15px; border-radius:20px; font-weight:bold;">EN/አማ</button>
</header>

<nav class="nav-bar" id="categoryNav"></nav>
<div class="container" id="menuListing"></div>
<a href="tel:+251954954591" class="call-order-btn">📞 <span id="callBtnText">Call To Order</span></a>

<div id="adminDashboard">
    <div style="display:flex; justify-content:space-between; align-items:center; background:var(--dark-green); padding:20px; color:var(--p-green); border-radius:12px; margin-bottom: 20px;">
        <h3 style="margin:0">MANAGEMENT</h3>
        <button onclick="APP.closeAdmin()" style="color:var(--p-green); border:none; background:none; font-size:40px;">&times;</button>
    </div>
    <div class="admin-section">
        <h4>1. Categories</h4>
        <div id="adminCatList"></div>
        <button class="btn" style="background:#8e44ad; width:100%;" onclick="APP.openModal('catModal')">+ ADD NEW CATEGORY</button>
    </div>
    <div class="admin-section">
        <h4>2. Items</h4>
        <button class="btn" style="background:#27ae60; width:100%;" onclick="APP.openModal('itemModal')">+ ADD NEW ITEM</button>
        <table style="width:100%; margin-top:10px;"><tbody id="adminItemBody"></tbody></table>
    </div>
    <button id="cloudBtn" onclick="APP.saveToCloud()" style="width:100%; padding:20px; background:#27ae60; color:white; border:none; border-radius:12px; font-weight:bold; position:sticky; bottom:10px;">💾 SYNC ALL CHANGES</button>
</div>

<div id="catModal" class="overlay"><div class="modal" onclick="event.stopPropagation()">
    <h3>New Category</h3>
    <input type="text" id="nCatId" placeholder="ID (e.g. cakes)">
    <input type="text" id="nCatEn" placeholder="English Name">
    <input type="text" id="nCatAm" placeholder="Amharic Name">
    <input type="file" onchange="APP.handleImg(this)">
    <button onclick="APP.createNewCat()" class="btn" style="background:#8e44ad; width:100%; margin-top:10px;">CREATE</button>
</div></div>

<div id="itemModal" class="overlay"><div class="modal" onclick="event.stopPropagation()">
    <h3>Add Item</h3>
    <select id="nItemCat"></select>
    <input type="text" id="nItemEn" placeholder="English Name">
    <input type="text" id="nItemAm" placeholder="Amharic Name">
    <input type="number" id="nItemPrice" placeholder="Price">
    <input type="file" onchange="APP.handleImg(this)">
    <button onclick="APP.createNewItem()" class="btn" style="background:#27ae60; width:100%; margin-top:10px;">ADD</button>
</div></div>

<div id="loginOverlay" class="overlay"><div class="modal" onclick="event.stopPropagation()">
    <h2 style="text-align:center;">Admin Login</h2>
    <input type="text" id="uIn" placeholder="Username">
    <input type="password" id="pIn" placeholder="Password">
    <button onclick="APP.verifyLogin()" class="btn" style="background:var(--dark-green); width:100%; margin-top:10px;">LOGIN</button>
</div></div>

<script>
    const APP = {
        URL: "https://script.google.com/macros/s/AKfycbwMJhw_-L2p7UGqfdoSGF4w6j2MUHPeSRfiRX7iBQtLQX1TPHGgh_7VFKKNdoTQ-IGK/exec",
        data: [], cats: [], lang: 'en', activeCat: '', imgTmp: '',

        init: async function() {
            // LOAD FROM STORAGE FIRST (Persistence Fix)
            const local = localStorage.getItem('TAEM_DATA');
            if(local) {
                const p = JSON.parse(local);
                this.data = p.data; this.cats = p.cats;
                if(this.cats.length > 0) this.activeCat = this.cats[0].id;
                this.render();
            }

            // THEN SYNC FROM CLOUD
            try {
                const r = await fetch(`${this.URL}?t=${Date.now()}`);
                const j = await r.json();
                if(j.cats && j.cats.length > 0) {
                    this.data = j.items;
                    this.cats = j.cats;
                    this.saveLocal();
                    if(!this.activeCat) this.activeCat = this.cats[0].id;
                    this.render();
                }
            } catch(e) { console.log("Offline mode"); }
        },

        saveLocal: function() {
            localStorage.setItem('TAEM_DATA', JSON.stringify({data: this.data, cats: this.cats}));
        },

        render: function() {
            const isEn = this.lang === 'en';
            document.getElementById('mainTitle').innerText = isEn ? "TAEM BAKERY" : "ጣዕም ዳቦና ኬክ";
            document.getElementById('callBtnText').innerText = isEn ? "Call To Order" : "ለመዘዝ ይደውሉ";

            document.getElementById('categoryNav').innerHTML = this.cats.map(c => `
                <div class="nav-item ${this.activeCat == c.id ? 'active' : ''}" onclick="APP.setCat('${c.id}')">
                    <img src="${c.img || ''}" onerror="this.src='https://via.placeholder.com/150'">
                    <p>${isEn ? c.en : c.am}</p>
                </div>`).join('');

            const filtered = this.data.filter(i => String(i.cat) === String(this.activeCat));
            document.getElementById('menuListing').innerHTML = filtered.map(i => `
                <div class="card">
                    <img src="${i.img || ''}" class="food-img" onerror="this.src='https://via.placeholder.com/150'">
                    <div>
                        <div class="food-title">${isEn ? i.en : i.am}</div>
                        <div class="price-tag">${i.price} ETB</div>
                    </div>
                </div>`).join('');
            this.renderAdmin();
        },

        renderAdmin: function() {
            document.getElementById('adminCatList').innerHTML = this.cats.map((c, idx) => `
                <div style="background:white; padding:10px; margin-bottom:5px; border:1px solid #ddd;">
                    <b>${c.en}</b> | <button onclick="APP.deleteCat('${c.id}')" style="color:red; border:none; background:none;">Delete</button>
                </div>`).join('');
            document.getElementById('adminItemBody').innerHTML = this.data.map((i, idx) => `
                <tr>
                    <td>${i.en}</td>
                    <td><button onclick="APP.deleteItem(${idx})" style="color:red; border:none; background:none;">Del</button></td>
                </tr>`).join('');
            document.getElementById('nItemCat').innerHTML = this.cats.map(c => `<option value="${c.id}">${c.en}</option>`).join('');
        },

        setCat: function(id) { this.activeCat = id; this.render(); },
        toggleLang: function() { this.lang = (this.lang === 'en' ? 'am' : 'en'); this.render(); },
        showLogin: function(e) { e.stopPropagation(); document.getElementById('loginOverlay').style.display='flex'; },
        verifyLogin: function() { 
            if(document.getElementById('uIn').value==='admin' && document.getElementById('pIn').value==='sgs'){ 
                document.getElementById('adminDashboard').style.display='block'; 
                this.closeModals(); 
            }
        },
        closeAdmin: function() { document.getElementById('adminDashboard').style.display='none'; },
        closeModals: function() { document.querySelectorAll('.overlay').forEach(o => o.style.display='none'); },
        closeOnOutside: function(e) { if(e.target.className === 'overlay') this.closeModals(); },
        openModal: function(id) { document.getElementById(id).style.display='flex'; },
        handleImg: function(input) { const r = new FileReader(); r.onload = (e) => this.imgTmp = e.target.result; r.readAsDataURL(input.files[0]); },
        
        createNewCat: function() { 
            const id = document.getElementById('nCatId').value.trim(); 
            if(id){ 
                this.cats.push({id, en:document.getElementById('nCatEn').value, am:document.getElementById('nCatAm').value, img:this.imgTmp}); 
                this.saveLocal(); this.closeModals(); this.render(); 
            } 
        },
        createNewItem: function() {
            this.data.push({ cat: document.getElementById('nItemCat').value, en: document.getElementById('nItemEn').value, am: document.getElementById('nItemAm').value, price: document.getElementById('nItemPrice').value, img: this.imgTmp });
            this.saveLocal(); this.closeModals(); this.render();
        },
        deleteCat: function(id) { this.cats = this.cats.filter(c => c.id != id); this.saveLocal(); this.render(); },
        deleteItem: function(idx) { this.data.splice(idx, 1); this.saveLocal(); this.render(); },

        saveToCloud: async function() {
            const b = document.getElementById('cloudBtn');
            b.innerText = "SYNCING..."; b.disabled = true;
            this.saveLocal();
            try {
                await fetch(this.URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ items: this.data, cats: this.cats }) });
                alert("Cloud Sync Successful!");
            } catch(e) { alert("Cloud Fail - Saved to Phone only."); }
            finally { b.innerText = "💾 SYNC ALL CHANGES"; b.disabled = false; }
        }
    };
    window.onload = () => APP.init();
</script>
</body>
</html>
